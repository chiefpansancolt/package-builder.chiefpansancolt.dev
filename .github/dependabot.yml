version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      tailwind:
        patterns:
          - tailwindcss
          - '@tailwindcss/*'
      vercel:
        patterns:
          - '@vercel/*'
      prettier:
        patterns:
          - prettier
          - prettier-plugin-tailwindcss
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - eslint-config-next
          - '@types/react'
          - '@types/react-dom'
          - tailwindcss
          - '@tailwindcss/*'
          - prettier
          - prettier-plugin-tailwindcss
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
